name: Validate & Release

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build (if present)
        run: npm run build --if-present

      - name: Run tests
        run: npm test

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "ERROR: Invalid JSON in $f"
              exit 1
            fi
            echo "  ✓ $f"
          done

      - name: Check SKILL.md frontmatter
        run: |
          echo "Checking SKILL.md files..."
          for skill_dir in skills/*/; do
            skill_md="$skill_dir/SKILL.md"
            if [ ! -f "$skill_md" ]; then
              echo "ERROR: Missing SKILL.md in $skill_dir"
              exit 1
            fi
            if ! head -1 "$skill_md" | grep -q "^---"; then
              echo "ERROR: Missing frontmatter in $skill_md"
              exit 1
            fi
            echo "  ✓ $skill_dir"
          done

      - name: Check template.md files
        run: |
          echo "Checking template.md files..."
          for skill_dir in skills/*/; do
            template_md="$skill_dir/template.md"
            if [ ! -f "$template_md" ]; then
              echo "ERROR: Missing template.md in $skill_dir"
              exit 1
            fi
            echo "  ✓ $skill_dir"
          done

      - name: Validate marketplace.json
        run: |
          echo "Validating marketplace.json..."
          if [ -f ".claude-plugin/marketplace.json" ]; then
            python3 -m json.tool ".claude-plugin/marketplace.json" > /dev/null
            echo "  ✓ .claude-plugin/marketplace.json"
          fi

      - name: Summary
        run: |
          echo "========================================="
          echo "✅ All validations passed!"
          echo "========================================="
          echo ""
          echo "Plugin structure:"
          echo "  Skills: $(ls -d skills/*/ | wc -l)"
          echo "  Agents: $(ls agents/*.md 2>/dev/null | wc -l)"
          echo "  Hooks: $(ls hooks/*.js 2>/dev/null | wc -l)"
          echo "  Scripts: $(ls scripts/*.js 2>/dev/null | wc -l)"

  sync-version:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          PREVIOUS_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8')).version" 2>/dev/null || echo "0.0.0")
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed: $PREVIOUS_VERSION -> $CURRENT_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "No version change detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync version across all files
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "Syncing version references..."
          node scripts/sync-version.js

      - name: Commit version sync changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes to commit
          if git diff --quiet; then
            echo "No version sync changes needed"
          else
            git add -A
            git commit -m "chore: sync version references to $(node -p "require('./package.json').version") [skip ci]"
            git push origin main
            echo "Version sync changes committed"
          fi

  release:
    needs: sync-version
    if: needs.sync-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          VERSION=${{ needs.sync-version.outputs.new_version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping"
          else
            git config user.name "Fattain Naime"
            git config user.email "iamnaime@builderhall.com"
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
            echo "Created and pushed tag: v$VERSION"
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.sync-version.outputs.new_version }}
          if gh release view "v$VERSION" &>/dev/null; then
            echo "Release v$VERSION already exists, skipping"
          else
            gh release create "v$VERSION" \
              --title "v$VERSION Release" \
              --generate-notes \
              --latest
            echo "Created release: v$VERSION"
          fi
