name: Bug Report
description: Report a bug or unexpected behavior in the engineering-docs plugin
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: What version of engineering-docs are you using?
      placeholder: "1.2.1"
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent Platform
      description: Which agent are you using?
      options:
        - Claude Code
        - Gemini CLI
        - Cursor
        - Windsurf
        - Copilot CLI
        - Goose
        - Pi
        - OpenCode
        - Kilo Code
        - Roo Code
        - Cline
        - Kimi Code
        - Codex
        - Factory Droid
        - Other
    validations:
      required: true

  - type: dropdown
    id: skill
    attributes:
      label: Affected Skill
      description: Which skill is affected?
      options:
        - using-engineering-docs (orchestrator)
        - business-concept
        - project-plan
        - user-personas-behavior
        - technical-specification
        - technical-feasibility-study
        - ux-flow-specification
        - design-system-specification
        - system-architecture-document
        - architecture-decision-record
        - database-design-document
        - api-design-document
        - admin-access-control-specification
        - technical-blueprint
        - security-threat-model
        - test-strategy-document
        - implementation-plan
        - deployment-plan
        - slo-error-budget-document
        - technical-runbook
        - disaster-recovery-plan
        - incident-postmortem
        - Multiple skills
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Install the plugin
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Any error messages or logs?
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context (screenshots, OS, Node version, etc.)
